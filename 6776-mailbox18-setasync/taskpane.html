<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mailbox 1.8 internetHeaders repro</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    body { font-family: Segoe UI, sans-serif; font-size: 13px; padding: 12px; }
    button { padding: 8px 14px; margin-bottom: 12px; }
    pre { background: #f3f3f3; border: 1px solid #ccc; padding: 10px; white-space: pre-wrap; word-break: break-word; }
    .fail { color: #b00; font-weight: bold; }
    .ok { color: #0a0; font-weight: bold; }
  </style>
</head>
<body>
  <h3>Mailbox 1.8 / internetHeaders.setAsync repro</h3>
  <p>Bug #6776 — reproduces #6076 against on-prem Exchange SE.</p>
  <button id="runBtn">Run check</button>
  <pre id="out">Waiting for Office.onReady...</pre>

  <script>
    const out = document.getElementById("out");
    const log = (s) => { out.textContent += "\n" + s; console.log(s); };

    Office.onReady((info) => {
      out.textContent = "Office.onReady fired. Host=" + info.host + " Platform=" + info.platform;
      document.getElementById("runBtn").onclick = runCheck;
    });

    function runCheck() {
      out.textContent = "";

      // --- Environment / diagnostics ---
      try {
        const diag = Office.context.mailbox.diagnostics;
        log("hostName: " + diag.hostName);
        log("hostVersion: " + diag.hostVersion);
        log("OWAView: " + diag.OWAView);
      } catch (e) {
        log("diagnostics error: " + e.message);
      }

      // --- Requirement-set checks ---
      const sets = ["1.1","1.3","1.5","1.7","1.8","1.9"];
      sets.forEach((v) => {
        const supported = Office.context.requirements.isSetSupported("Mailbox", v);
        log("isSetSupported(Mailbox, " + v + ") = " + supported);
      });

      const item = Office.context.mailbox.item;
      log("internetHeaders property present: " + (item.internetHeaders !== undefined));
      if (item.internetHeaders !== undefined) {
        log("internetHeaders.setAsync present: " + (item.internetHeaders.setAsync !== undefined));
      }

      // --- The actual repro: matches the snippet from the GitHub issue ---
      const mailbox18Check = Office.context.requirements.isSetSupported("Mailbox", "1.8");
      if (mailbox18Check && item.internetHeaders !== undefined && item.internetHeaders.setAsync !== undefined) {
        log("Mailbox 1.8 reported supported -> calling internetHeaders.setAsync(...)");
        item.internetHeaders.setAsync(
          { "X-Repro-Header": "test-value-" + Date.now() },
          (asyncResult) => {
            if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
              log("RESULT: Succeeded ✅");
              out.innerHTML += "\n<span class='ok'>setAsync SUCCEEDED</span>";
            } else {
              log("RESULT: Failed ❌");
              log("error.code: " + asyncResult.error.code);
              log("error.message: " + asyncResult.error.message);
              log("error.name: " + asyncResult.error.name);
              out.innerHTML += "\n<span class='fail'>setAsync FAILED (code "
                + asyncResult.error.code + ": " + asyncResult.error.message + ")</span>";
            }
          }
        );
      } else {
        log("Mailbox 1.8 / internetHeaders not available — skipping setAsync call.");
      }
    }
  </script>
</body>
</html>
